sonar.projectKey=ServEase_ServEase-mobile
sonar.organization=servease

# Paths
sonar.sources=.
sonar.exclusions=**/node_modules/**,**/__tests__/**,**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx,**/coverage/**,**/.expo/**,**/dist/**,**/android/**,**/ios/**
sonar.tests=.
sonar.test.inclusions=**/__tests__/**,**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx

# Code Coverage
sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.coverage.exclusions=**/__tests__/**,**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx,**/node_modules/**,**/.expo/**

# TypeScript
sonar.typescript.tsconfigPath=tsconfig.json

# Language
sonar.sourceEncoding=UTF-8
