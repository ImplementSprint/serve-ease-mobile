sonar.projectKey=ServEase_ServEase-mobile
sonar.organization=servease

# Paths
sonar.sources=services,lib
sonar.tests=services/__tests__,lib/__tests__
sonar.inclusions=services/addressService.ts,lib/error-handling.ts
sonar.test.inclusions=services/__tests__/**/*.test.ts,lib/__tests__/**/*.test.ts
sonar.exclusions=**/node_modules/**,**/coverage/**,**/.expo/**,**/dist/**,**/build/**,**/android/**,**/ios/**,**/assets/**,**/.github/**,**/maestro-manual/**,**/.maestro/**,**/scripts/**

# Code Coverage
sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.coverage.exclusions=**/__tests__/**,**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx,**/node_modules/**,**/.expo/**,**/app/**/_layout.tsx,**/app/**/+not-found.tsx

# TypeScript
sonar.typescript.tsconfigPath=tsconfig.json

# Language
sonar.sourceEncoding=UTF-8
