sonar.projectKey=ServEase_ServEase-mobile
sonar.organization=servease

# Paths
sonar.sources=app,src,components,constants,context,hooks,lib,services
sonar.tests=__tests__
sonar.inclusions=**/*.ts,**/*.tsx,**/*.js,**/*.jsx
sonar.test.inclusions=__tests__/**/*,**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx
sonar.exclusions=**/node_modules/**,**/coverage/**,**/.expo/**,**/dist/**,**/build/**,**/android/**,**/ios/**,**/assets/**,**/.github/**,**/maestro-manual/**,**/.maestro/**,**/scripts/**

# Code Coverage
sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.coverage.exclusions=**/__tests__/**,**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx,**/node_modules/**,**/.expo/**,**/app/**/_layout.tsx,**/app/**/+not-found.tsx

# TypeScript
sonar.typescript.tsconfigPath=tsconfig.json

# Language
sonar.sourceEncoding=UTF-8
